# This workflow checks out code, builds an image, performs a container image# 此工作流用于检出代码、构建镜像，并执行容器镜像# 此工作流用于检出代码、构建镜像，并执行容器镜像
# scan with Anchore's Syft tool, and uploads the results to the GitHub Dependency# 使用Anchore的Syft工具进行扫描，并将结果上传至GitHub Dependency# 使用Anchore的Syft工具进行扫描，并将结果上传至GitHub Dependency
# submission API.# 提交 API。

# For more information on the Anchore sbom-action usage
# and parameters, see https://github.com/anchore/sbom-action. For more
# information about the Anchore SBOM tool, Syft, see
# https://github.com/anchore/syft
name: Anchore Syft SBOM scan

on:开启:
  push:推送:
    branches: [ "main" ]分支: [ "main" ]

permissions:
  contents: write

jobs:
  Anchore-Build-Scan:
    permissions:
      contents: write # required to upload to the Dependency submission API
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the code
      uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag localbuild/testimage:latest
    - name: Scan the image and upload dependency results
      uses: anchore/sbom-action@bb716408e75840bbb01e839347cd213767269d4a
      with:
        image: "localbuild/testimage:latest"
        artifact-name: image.spdx.json
        dependency-snapshot: true
